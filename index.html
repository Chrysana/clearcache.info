<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Clear your browser cache easily with step-by-step instructions for all major browsers and platforms.">
  <meta name="keywords" content="clear cache, browser cache, Chrome, Firefox, Safari, Edge, Opera, Brave, Vivaldi, DuckDuckGo, instructions, cache clearing">
  <title>Clear Your Browser Cache</title>
  <link rel="stylesheet" href="style.css">

  <!-- Open Graph Metadata -->
  <meta property="og:title" content="Clear Your Browser Cache">
  <meta property="og:description" content="Step-by-step instructions for clearing browser cache on Chrome, Firefox, Safari, Edge, and more.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- Google Ads Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3053957853685728" crossorigin="anonymous"></script>
</head>
<body>
  <header>
    <h1>Clear Your Browser Cache</h1>
    <p class="subtitle">We detect your browser automatically — or choose manually below.</p>
  </header>
  <main>
    <p id="detection-message">Detecting your browser and OS...</p>
    <section id="instructions"></section>
    <div id="manual-selection">
      <h2>Looking for a different browser?</h2>
      <div class="select-group">
        <div class="select-wrapper">
          <label for="browser-select">Browser</label>
          <select id="browser-select">
            <option value="" disabled selected>Choose a browser</option>
          </select>
        </div>
        <div class="select-wrapper">
          <label for="os-select">Operating System</label>
          <select id="os-select">
            <option value="" disabled selected>Choose an OS</option>
          </select>
        </div>
      </div>
      <button id="manual-submit">Get Instructions</button>
    </div>
  </main>
  <footer>
    <p>Works with Chrome, Firefox, Safari, Edge, Opera, Brave, Vivaldi, DuckDuckGo, Samsung Internet, and Tor.</p>
  </footer>
  <script type="module" src="script.js"></script>
</body>
</html>
